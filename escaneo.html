<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexNet Ops - Gestión de Distribución</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --primary-dark: #4338ca;
            --bg: #f8fafc; --sidebar: #0f172a;
            --text-main: #1e293b; --text-muted: #64748b;
            --white: #ffffff; --danger: #ef4444; --success: #22c55e;
            --warning: #f59e0b; --info: #0ea5e9;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            margin: 0; display: flex; height: 100vh; color: var(--text-main);
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background-color: var(--sidebar); color: white;
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0;
        }
        .brand { font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-link {
            padding: 12px 15px; border-radius: 8px; color: #94a3b8; text-decoration: none;
            font-weight: 600; margin-bottom: 5px; transition: all 0.2s; display: block;
        }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: var(--primary); color: white; }
        .btn-logout { margin-top: auto; background: #334155; color: #f8fafc; text-align: center; cursor: pointer; padding: 10px; border-radius: 8px; border: none; font-weight: 600;}
        .btn-logout:hover { background: rgba(255,255,255,0.2); }

        /* MAIN CONTENT */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        .user-pill { background: white; padding: 8px 18px; border-radius: 50px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 600; border: 1px solid #e2e8f0; }

        /* CARDS */
        .card { background: var(--white); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; 
            font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* TABLE */
        .table-container { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 15px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover { background: #f8fafc; }

        .text-truncate {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
            vertical-align: middle;
            font-size: 0.85rem;
        }

        .badge { padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; display: inline-block; }
        .btn-action { padding: 8px 12px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-del { background: #fee2e2; color: #b91c1c; }
        .btn-del:hover { background: #ef4444; color: white; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;}
        .btn-primary:disabled { background: #cbd5e1; cursor: not-allowed; }

        /* NOTIFICATIONS */
        #toast-container { 
            position: fixed; bottom: 20px; right: 20px; z-index: 9999; 
            display: flex; flex-direction: column; gap: 10px; 
            max-height: 85vh; overflow-y: auto; padding-right: 5px;
            pointer-events: none;
        }
        #toast-container::-webkit-scrollbar { width: 4px; }
        #toast-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 4px; }

        .toast { 
            background: var(--sidebar); color: white; padding: 16px 24px; border-radius: 10px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); animation: slideIn 0.3s ease-out; 
            pointer-events: auto;
            font-size: 0.95rem;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .stats { display: flex; gap: 20px; margin-top: 10px; align-items: center; }
        .stat-val { font-weight: 800; color: var(--primary); }
        
        #lblSincronizando {
            background-color: var(--warning);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            display: none; 
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">📦 FlexNet Ops</div>
        <nav>
            <a href="escaneo.html" class="nav-link active">Módulo Distribución</a>
            <a href="cargar_eventos.html" class="nav-link">Módulo Eventos</a>
            <a href="cargar_guias.html" class="nav-link">Asignar Guías</a>
            <a href="carta_porte.html" class="nav-link">Carta Porte</a>
        </nav>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Distribución de Carga</h1>
                <div class="stats">
                    <span>Total hoy: <span class="stat-val" id="lblTotal">0</span></span>
                    <span>Mostrando: <span class="stat-val" id="lblVisibles">0</span></span>
                    <span id="lblSincronizando">⚡ Sincronizando: <span id="lblSyncCount">0</span> pedidos</span>
                </div>
            </div>
            <div class="user-pill">
                <span id="lblOperador">---</span> • <span id="lblFecha" style="color:var(--text-muted); font-size: 0.8rem;">---</span>
            </div>
        </div>

        <div class="card">
            <div class="grid-inputs">
                <div>
                    <label id="fileLabel">1. Cargar Monitor (Excel)</label>
                    <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv">
                </div>
                <div>
                    <label>2. Filtrar y Bloquear por Provincia</label>
                    <select id="filtroProvincia" disabled onchange="renderizarTabla()">
                        <option value="GENERAL">Todas las provincias (Modo Libre)</option>
                        <option value="PICHINCHA">PICHINCHA</option>
                        <option value="GUAYAS">GUAYAS</option>
                        <option value="AZUAY">AZUAY</option>
                        <option value="MANABI">MANABI</option>
                        <option value="TUNGURAHUA">TUNGURAHUA</option>
                        <option value="LOS RIOS">LOS RIOS</option>
                        <option value="EL ORO">EL ORO</option>
                        <option value="CHIMBORAZO">CHIMBORAZO</option>
                        <option value="IMBABURA">IMBABURA</option>
                    </select>
                </div>
                <div>
                    <label>3. Escaneo Individual Automático</label>
                    <input type="text" id="scannerInput" placeholder="Escanea código..." disabled autocomplete="off">
                </div>
            </div>
            <div style="margin-top: 20px;">
                <label>4. Escaneo Masivo (Pegar lista de IDs)</label>
                <div style="display: flex; gap: 10px;">
                    <textarea id="bulkInput" rows="1" placeholder="Pega aquí los IDs separados por espacios o saltos de línea..." disabled style="resize: none;"></textarea>
                    <button class="btn-primary" id="btnProcesarMasivo" disabled>Procesar</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>ID Pedido</th>
                        <th>Referencia</th>
                        <th>Estado</th>
                        <th>Cliente</th>
                        <th>Dirección</th>
                        <th>Provincia / Localidad</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="listaPedidos"></tbody>
            </table>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="configuracion_nube.js"></script>
    <script>
        let monitorData = []; 
        let pedidosEscaneadosLista = []; 
        let memoriaPedidos = new Set(); 
        let operadorActual = "";

        // COLA DE ENVÍO EN SEGUNDO PLANO
        let colaEnvioNube = [];
        let guardandoEnFondo = false;

        async function enviarMasivoAGoogleSheets(lotePedidos) {
            const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const fechaLarga = new Date().toLocaleDateString('es-ES', opcionesFecha).toUpperCase();

            const payload = {
                action: 'guardar_masivo',
                pedidos: lotePedidos.map(p => ({
                    fecha: fechaLarga,
                    usuario: operadorActual,
                    idpedido: p.idpedido,
                    referencia: p.Nro_Referencia,
                    estado: p.Estado,
                    // 🌟 Enviamos Provincia y Localidad juntas a la columna Ciudad de tu nube
                    ciudad: `${p.Provincia} / ${p.Localidad}` 
                }))
            };

            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        }

        async function enviarAGoogleSheets(p) {
            const payload = {
                fecha: new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase(),
                usuario: operadorActual,
                idpedido: p.idpedido,
                referencia: p.Nro_Referencia,
                estado: p.Estado,
                // 🌟 Igual aquí
                ciudad: `${p.Provincia} / ${p.Localidad}` 
            };
            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
        }

        async function procesarColaEnvio() {
            if (guardandoEnFondo || colaEnvioNube.length === 0) return;
            guardandoEnFondo = true;
            document.getElementById('lblSincronizando').style.display = 'inline-block';
            
            while (colaEnvioNube.length > 0) {
                document.getElementById('lblSyncCount').innerText = colaEnvioNube.length;
                let lote = colaEnvioNube.splice(0, colaEnvioNube.length); 
                try {
                    if (lote.length === 1) { await enviarAGoogleSheets(lote[0]); } 
                    else { await enviarMasivoAGoogleSheets(lote); }
                } catch(e) {
                    colaEnvioNube.unshift(...lote); 
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
            guardandoEnFondo = false;
            document.getElementById('lblSincronizando').style.display = 'none';
        }

        async function guardarEstadoLocal() {
            try {
                await localforage.setItem('monitorData_flexnet', monitorData);
                await localforage.setItem('pedidosEscaneados_flexnet', pedidosEscaneadosLista);
            } catch (e) {
                console.error("Error guardando localmente.", e);
            }
        }

        window.onload = async function() {
            operadorActual = localStorage.getItem('operador_actual');
            if (!operadorActual) { window.location.href = 'index.html'; return; }

            document.getElementById('lblOperador').innerText = operadorActual;
            document.getElementById('lblFecha').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }).toUpperCase();

            try {
                const savedMonitor = await localforage.getItem('monitorData_flexnet');
                const savedPedidos = await localforage.getItem('pedidosEscaneados_flexnet');

                if (savedMonitor && savedMonitor.length > 0) {
                    monitorData = savedMonitor;
                    ['filtroProvincia', 'scannerInput', 'bulkInput', 'btnProcesarMasivo'].forEach(id => document.getElementById(id).disabled = false);
                    document.getElementById('fileLabel').innerHTML = "✅ Monitor Activo en Memoria";
                    document.getElementById('fileLabel').style.color = "var(--success)";
                    
                    if (savedPedidos) {
                        pedidosEscaneadosLista = savedPedidos;
                        pedidosEscaneadosLista.forEach(p => memoriaPedidos.add(String(p.idpedido)));
                    }
                    renderizarTabla();
                } else {
                    mostrarNotificacion("👋 ¡Bienvenido! Para comenzar, carga el archivo Excel del Monitor.", "var(--info)");
                }
            } catch (e) { localforage.clear(); }
        };

        document.getElementById('fileUpload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                monitorData = rawData.map(row => ({
                    idpedido: String(row.idpedido || ''),
                    Nro_Referencia: String(row.Nro_Referencia || row.Referencia || '-'),
                    Estado: String(row.Estado || 'EN_TRANSITO'),
                    Cliente: String(row.Cliente || 'S/C'),
                    Direccion: String(row.direccion || row.Direccion || row.DIRECCION || '---'),
                    Localidad: String(row.Localidad || row.Ciudad || 'GENERAL'),
                    // 🌟 CAPTURAMOS LA PROVINCIA DEL EXCEL
                    Provincia: String(row.Provincia || row.PROVINCIA || 'GENERAL').toUpperCase().trim(),
                    Nro_Remito: String(row.Nro_Remito || row.Remito || '') 
                })).filter(row => row.idpedido !== ''); 
                
                ['filtroProvincia', 'scannerInput', 'bulkInput', 'btnProcesarMasivo'].forEach(id => document.getElementById(id).disabled = false);
                document.getElementById('fileLabel').innerHTML = "✅ Monitor Activo en Memoria";
                document.getElementById('fileLabel').style.color = "var(--success)";
                
                mostrarNotificacion("✅ Monitor cargado. Sincronizando datos previos...", "var(--success)");
                
                pedidosEscaneadosLista = [];
                memoriaPedidos.clear();
                await sincronizarConNube();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        async function sincronizarConNube() {
            try {
                const urlFinal = `${GOOGLE_SHEET_URL}?operacion=consultar_carga&operador=${encodeURIComponent(operadorActual)}`;
                const res = await fetch(urlFinal);
                if (!res.ok) throw new Error("Error en red HTTP");
                
                const datosNube = await res.json();
                const hoy = new Date();
                let recuperados = 0;

                if (Array.isArray(datosNube)) {
                    datosNube.forEach(p => {
                        if (!p.idpedido) return;
                        let esHoy = false;
                        let valFechaStr = String(p.fechasistema || p.fecha || "").toUpperCase();
                        let diaActual = hoy.getDate().toString();
                        let mesActual = hoy.toLocaleDateString('es-ES', { month: 'long' }).toUpperCase();
                        let anioActual = hoy.getFullYear().toString();
                        
                        if (valFechaStr.includes(diaActual) && valFechaStr.includes(mesActual) && valFechaStr.includes(anioActual)) {
                            esHoy = true;
                        }

                        if (esHoy && !memoriaPedidos.has(String(p.idpedido))) {
                            memoriaPedidos.add(String(p.idpedido));
                            const infoExcel = monitorData.find(row => row.idpedido === String(p.idpedido) || row.Nro_Referencia === String(p.idpedido));
                            
                            pedidosEscaneadosLista.push({
                                idpedido: p.idpedido,
                                Nro_Referencia: infoExcel ? infoExcel.Nro_Referencia : (p.referencia || '-'),
                                Estado: infoExcel ? infoExcel.Estado : (p.estado || 'EN_TRANSITO'),
                                Cliente: infoExcel ? infoExcel.Cliente : 'S/C',
                                Direccion: infoExcel ? infoExcel.Direccion : '---',
                                Localidad: infoExcel ? infoExcel.Localidad : 'GENERAL',
                                Provincia: infoExcel ? infoExcel.Provincia : 'GENERAL',
                                Nro_Remito: infoExcel ? infoExcel.Nro_Remito : '' 
                            });
                            recuperados++;
                        }
                    });

                    renderizarTabla();
                    await guardarEstadoLocal(); 

                    if (recuperados > 0) {
                        mostrarNotificacion(`✅ Se restauraron ${recuperados} pedidos escaneados HOY`, "var(--success)");
                    } else {
                        mostrarNotificacion(`ℹ️ No se encontraron pedidos escaneados previamente el día de hoy. ¡Lista limpia!`, "var(--info)");
                    }
                }
            } catch (e) {
                mostrarNotificacion("⚠️ Error de conexión con la nube", "#ef4444");
            }
        }

        // 🌟 LÓGICA DE BLOQUEO POR PROVINCIA
        function procesarCodigo(codigo, masivo = false) {
            let clean = String(codigo).trim(); 
            if (!clean) return { success: false, reason: 'empty' };
            if (clean.endsWith("-1")) clean = clean.slice(0, -2);
            if (memoriaPedidos.has(clean)) {
                if(!masivo) mostrarNotificacion(`⚠️ El pedido <b>${clean}</b> ya se escaneó hoy`, "#f59e0b");
                return { success: false, reason: 'duplicate', id: clean };
            }

            const info = monitorData.find(row => row.idpedido === clean || row.Nro_Referencia === clean);

            if (info) {
                const filtroActual = document.getElementById('filtroProvincia').value;
                const provinciaPaquete = String(info.Provincia || 'GENERAL').toUpperCase().trim();

                if (filtroActual !== "GENERAL" && provinciaPaquete !== filtroActual) {
                    if(!masivo) mostrarNotificacion(`🚫 Bloqueado: <b>${clean}</b> pertenece a la provincia de <b>${provinciaPaquete}</b>`, "#ef4444");
                    return { success: false, reason: 'blocked_city', id: clean, city: provinciaPaquete }; 
                }

                memoriaPedidos.add(String(info.idpedido));
                
                const nuevoPedido = {
                    idpedido: info.idpedido,
                    Nro_Referencia: info.Nro_Referencia,
                    Estado: info.Estado,
                    Cliente: info.Cliente,
                    Direccion: info.Direccion,
                    Localidad: info.Localidad,
                    Provincia: provinciaPaquete,
                    Nro_Remito: info.Nro_Remito
                };
                
                pedidosEscaneadosLista.push(nuevoPedido);
                guardarEstadoLocal(); 
                
                colaEnvioNube.push(nuevoPedido);
                procesarColaEnvio(); 
                
                if (!masivo) {
                    renderizarTabla();
                    mostrarNotificacion(`✅ Pedido <b>${info.idpedido}</b> registrado`, "var(--success)");
                }
                return { success: true, id: info.idpedido };
            } else {
                if(!masivo) mostrarNotificacion(`❌ ID <b>${clean}</b> no se encuentra en el Monitor`, "#ef4444");
                return { success: false, reason: 'not_found', id: clean };
            }
        }

        // DICCIONARIO DE COLORES POR PROVINCIA
        function getColorProvincia(provincia) {
            const p = String(provincia).toUpperCase().trim();
            if (p.includes('PICHINCHA')) return '#3b82f6'; // Azul
            if (p.includes('GUAYAS')) return '#0ea5e9'; // Celeste
            if (p.includes('AZUAY')) return '#8b5cf6'; // Morado
            if (p.includes('TUNGURAHUA')) return '#f59e0b'; // Naranja
            if (p.includes('MANABI')) return '#10b981'; // Verde
            if (p.includes('LOS RIOS')) return '#ec4899'; // Rosa
            if (p.includes('EL ORO')) return '#eab308'; // Amarillo
            if (p.includes('CHIMBORAZO')) return '#ef4444'; // Rojo
            if (p.includes('IMBABURA')) return '#14b8a6'; // Verde azulado
            return '#64748b'; // Gris
        }

        function renderizarTabla() {
            const tbody = document.getElementById('listaPedidos');
            const filtro = document.getElementById('filtroProvincia').value;
            tbody.innerHTML = '';

            let filtrados = (filtro === "GENERAL") 
                ? [...pedidosEscaneadosLista] 
                : pedidosEscaneadosLista.filter(p => String(p.Provincia || "").toUpperCase().trim() === filtro);

            filtrados.reverse().forEach((p, i) => {
                const tr = document.createElement('tr');
                const badgeEstado = p.Estado?.includes('ENTRE') ? 'var(--success)' : (p.Estado?.includes('NOVE') ? 'var(--danger)' : 'var(--warning)');
                const badgeProvincia = getColorProvincia(p.Provincia);
                const direccionTexto = p.Direccion || '---';
                const nombreCiudad = p.Localidad || '---';
                
                tr.innerHTML = `
                    <td>${filtrados.length - i}</td>
                    <td><b>${p.idpedido}</b></td>
                    <td>${p.Nro_Referencia || '-'}</td>
                    <td><span class="badge" style="background:${badgeEstado}; color:white">${p.Estado}</span></td>
                    <td>${p.Cliente}</td>
                    <td><span class="text-truncate" title="${direccionTexto}">${direccionTexto}</span></td>
                    <td>
                        <span class="badge" style="background:${badgeProvincia}; color:white; margin-bottom:4px;">${p.Provincia}</span><br>
                        <small style="color:var(--text-muted); font-weight:600;">${nombreCiudad}</small>
                    </td>
                    <td style="text-align:right">
                        <button class="btn-action btn-del" onclick="eliminarPedido('${p.idpedido}')">Quitar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('lblTotal').innerText = pedidosEscaneadosLista.length;
            document.getElementById('lblVisibles').innerText = filtrados.length;
        }

        async function eliminarPedido(id) {
            if (!confirm(`¿Estás seguro de eliminar el pedido ${id} de tu lista de hoy?`)) return;
            
            try {
                pedidosEscaneadosLista = pedidosEscaneadosLista.filter(p => String(p.idpedido) !== String(id));
                memoriaPedidos.delete(String(id));
                renderizarTabla();
                guardarEstadoLocal(); 
                
                mostrarNotificacion("🗑️ Pedido quitado de la tabla", "#f59e0b");

                fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'eliminar_pedido', idpedido: id })
                });
            } catch (e) { 
                mostrarNotificacion("Error al intentar comunicarse con la nube.", "#ef4444"); 
            }
        }

        document.getElementById('scannerInput').addEventListener('input', function(e) {
            let val = this.value.trim();
            if (/^\d{7}$/.test(val) || val.endsWith('-1')) {
                procesarCodigo(val);
                this.value = ''; 
            }
        });

        document.getElementById('scannerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                procesarCodigo(this.value);
                this.value = '';
            }
        });

        document.getElementById('btnProcesarMasivo').addEventListener('click', function() {
            const input = document.getElementById('bulkInput');
            const ids = [...new Set(input.value.split(/[\n\t\s,]+/).filter(Boolean))];
            
            if(ids.length === 0) return;
            
            let exitosos = 0;
            
            for (let id of ids) {
                let resultado = procesarCodigo(id, true);
                
                if (resultado.success) {
                    exitosos++;
                } else if (resultado.reason === 'blocked_city') {
                    // Ahora alerta indicando la provincia
                    mostrarNotificacion(`🚫 <b>${resultado.id}</b> bloqueado (Pertenece a <b>${resultado.city}</b>)`, "#ef4444");
                } else if (resultado.reason === 'not_found') {
                    mostrarNotificacion(`❌ <b>${resultado.id}</b> no existe en el monitor`, "#ef4444");
                } else if (resultado.reason === 'duplicate') {
                    mostrarNotificacion(`⚠️ <b>${resultado.id}</b> ya escaneado`, "#f59e0b");
                }
            }
            
            renderizarTabla();
            input.value = '';
            
            if (exitosos > 0) {
                mostrarNotificacion(`⚡ ¡${exitosos} pedidos aceptados y en cola de subida!`, "var(--success)");
            } else {
                mostrarNotificacion(`ℹ️ Ningún pedido nuevo fue procesado.`, "var(--info)");
            }
        });

        function mostrarNotificacion(msg, color) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(color) toast.style.background = color;
            toast.innerHTML = msg; 
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 5000); 
        }

        window.addEventListener('beforeunload', function (e) {
            if (colaEnvioNube.length > 0) {
                e.preventDefault();
                e.returnValue = 'Aún se están guardando pedidos en la nube. Si sales ahora, perderás datos. ¿Seguro?';
            }
        });

        async function cerrarSesion() {
            if (colaEnvioNube.length > 0) {
                alert(`⚠️ ESPERA: Aún faltan por subir pedidos a la nube. Por favor, espera a que desaparezca el indicador de guardado amarillo antes de salir.`);
                return; 
            }
            
            localStorage.removeItem('operador_actual');
            await localforage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
