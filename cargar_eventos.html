<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexNet Ops - Asignación de Eventos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --primary-dark: #4338ca;
            --bg: #f8fafc;
            /* 🌟 CAMBIO: Color lateral Indigo Oscuro para distinguir el apartado */
            --sidebar: #312e81; /* Indigo-900 */
            --text-main: #1e293b; --text-muted: #64748b;
            --white: #ffffff; --danger: #ef4444; --success: #22c55e;
            --warning: #f59e0b; --info: #0ea5e9;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            margin: 0; display: flex; height: 100vh; color: var(--text-main);
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background-color: var(--sidebar); color: white;
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0;
        }
        .brand { font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-link {
            padding: 12px 15px; border-radius: 8px;
            /* 🌟 AJUSTE: Color de texto inactivo más claro para fondo indigo */
            color: #c7d2fe; /* Indigo-200 */
            text-decoration: none;
            font-weight: 600; margin-bottom: 5px; transition: all 0.2s; display: block;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active {
            /* 🌟 AJUSTE: Enlace activo contrastado contra fondo indigo */
            background: var(--white);
            color: var(--primary);
        }
        .btn-logout { margin-top: auto; background: rgba(255,255,255,0.1); color: #f8fafc; text-align: center; cursor: pointer; padding: 10px; border-radius: 8px; border: none; font-weight: 600;}
        .btn-logout:hover { background: rgba(255,255,255,0.2); }

        /* MAIN CONTENT */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        .user-pill { background: white; padding: 8px 18px; border-radius: 50px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 600; border: 1px solid #e2e8f0; }

        /* CARDS & CONTROLS */
        .card { background: var(--white); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; align-items: end; }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; 
            font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        
        select.destacado, input.destacado { border: 2px solid var(--primary); background-color: #eef2ff; font-weight: 600;}

        /* BOTONES FECHAS */
        .fechas-rapidas { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-quick-date { 
            padding: 6px 12px; font-size: 0.75rem; background: #f1f5f9; color: var(--text-muted); 
            border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; font-weight: 700; transition: 0.2s; text-transform: uppercase;
        }
        .btn-quick-date:hover:not(:disabled) { background: #e2e8f0; color: var(--text-main); }

        .btn-aplicar-masivo { 
            width: 100%; padding: 14px; margin-top: 20px; font-size: 1rem; background-color: var(--primary); 
            color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; 
        }
        .btn-aplicar-masivo:hover:not(:disabled) { background-color: var(--primary-dark); transform: translateY(-2px); }
        .btn-aplicar-masivo:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .estado-carga { 
            padding: 12px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 0.9rem;
            background: #f1f5f9; color: var(--text-muted); border: 1px dashed #cbd5e1; margin-bottom: 20px;
        }
        .estado-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        /* TABLE */
        .table-container { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 15px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover { background: #f8fafc; }
        tr.fila-procesada { background-color: #f0fdf4 !important; } 

        .text-truncate { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; }

        .badge { padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; display: inline-block; }
        .badge-evento { background-color: var(--primary); color: white;}
        .badge-pendiente { background-color: #f1f5f9; color: var(--text-muted); border: 1px dashed #cbd5e1; }

        .stats { display: flex; gap: 20px; margin-top: 10px; }
        .stat-val { font-weight: 800; color: var(--primary); }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--sidebar); color: white; padding: 16px 24px; border-radius: 10px; margin-top: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">📦 FlexNet Ops</div>
        <nav>
            <a href="escaneo.html" class="nav-link">Módulo Distribución</a>
            <a href="#" class="nav-link active">Módulo Eventos</a>
            <a href="cargar_guias.html" class="nav-link">Asignar Guías</a>
            <a href="carta_porte.html" class="nav-link">Carta Porte</a>
        </nav>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Asignación Masiva de Eventos</h1>
                <div class="stats">
                    <span>Total en carga: <span class="stat-val" id="lblTotal">0</span></span>
                    <span>Actualizados: <span class="stat-val" id="lblProcesados" style="color: var(--success)">0</span></span>
                </div>
            </div>
            <div class="user-pill">
                <span id="lblOperador">---</span> • <span id="lblFecha" style="color:var(--text-muted); font-size: 0.8rem;">---</span>
            </div>
        </div>

        <div id="panelCarga" class="estado-carga">
            ⏳ Verificando memoria de sesión...
        </div>

        <div class="card">
            <div class="grid-inputs">
                <div>
                    <label>1. Filtro de Ciudad:</label>
                    <select id="filtroCiudad" disabled onchange="renderizarTabla()">
                        <option value="GENERAL">TODAS (General)</option>
                        <option value="QUITO">QUITO</option>
                        <option value="GUAYAQUIL">GUAYAQUIL</option>
                        <option value="CUENCA">CUENCA</option>
                        <option value="AMBATO">AMBATO</option>
                        <option value="SANTO DOMINGO">SANTO DOMINGO</option>
                        <option value="SANTA ANA">SANTA ANA</option>
                    </select>
                </div>

                <div>
                    <label style="color: var(--primary);">2. Seleccionar Evento:</label>
                    <select id="selectEvento" class="destacado" disabled>
                        <option value="" disabled selected>-- Elegir un Evento --</option>
                        <option value="PEDIDO_EN_PROCESO">PEDIDO_EN_PROCESO</option>
                        <option value="FECHA_ESTIMADA_ENTREGA">FECHA_ESTIMADA_ENTREGA</option>
                        <option value="HABILITADO_RUTEO">HABILITADO_RUTEO</option>
                        <option value="PEDIDO_EN_TRANSITO">PEDIDO_EN_TRANSITO</option>
                    </select>
                </div>

                <div>
                    <label style="color: var(--primary);">3. Fecha de Evento:</label>
                    <div class="fechas-rapidas">
                        <button class="btn-quick-date" id="btnHoy" onclick="setFechaRapida('hoy')" disabled>Hoy</button>
                        <button class="btn-quick-date" id="btnManana" onclick="setFechaRapida('manana')" disabled>Mañana</button>
                    </div>
                    <input type="date" id="inputFechaEvento" class="destacado" disabled>
                </div>
            </div>
            
            <button id="btnAplicarMasivo" class="btn-aplicar-masivo" disabled onclick="aplicarEventoMasivo()">
                🚀 APLICAR Y DESCARGAR CSV
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>ID Pedido</th>
                        <th>Estado Base</th>
                        <th>Nuevo Evento</th>
                        <th>Fecha Evento</th>
                        <th>Cliente</th>
                        <th>Dirección</th>
                        <th>Ciudad</th>
                    </tr>
                </thead>
                <tbody id="listaPedidos"></tbody>
            </table>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="configuracion_nube.js"></script>
    <script>
        let pedidosEventosLista = []; 
        let operadorActual = "";

        // AL CARGAR LA PÁGINA
        window.onload = async function() {
            operadorActual = localStorage.getItem('operador_actual');
            if (!operadorActual) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('lblOperador').innerText = operadorActual;
            document.getElementById('lblFecha').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' }).toUpperCase();
            
            setFechaRapida('hoy');

            // 🌟 LEEMOS DE LA MEMORIA DE LOCALFORAGE (Igual que en escaneo.html)
            try {
                const cargaDistribucion = await localforage.getItem('pedidosEscaneados_flexnet');
                
                if (cargaDistribucion && cargaDistribucion.length > 0) {
                    pedidosEventosLista = cargaDistribucion.map(p => ({
                        ...p, Nuevo_Evento_Aplicado: "", Fecha_Evento_Aplicado: ""
                    }));

                    document.getElementById('panelCarga').classList.add('estado-ok');
                    document.getElementById('panelCarga').innerText = `✅ Base sincronizada con ${pedidosEventosLista.length} pedidos escaneados.`;
                    
                    ['filtroCiudad', 'selectEvento', 'inputFechaEvento', 'btnAplicarMasivo', 'btnHoy', 'btnManana'].forEach(id => document.getElementById(id).disabled = false);
                    renderizarTabla();
                } else {
                    document.getElementById('panelCarga').innerText = `⚠️ No hay pedidos escaneados en memoria. Ve al Módulo de Distribución primero.`;
                }
            } catch (error) {
                console.error("Error al cargar datos:", error);
                document.getElementById('panelCarga').innerText = `⚠️ Error leyendo la memoria local.`;
            }
        };

        function setFechaRapida(tipo) {
            let d = new Date();
            if (tipo === 'manana') d.setDate(d.getDate() + 1);
            const offset = d.getTimezoneOffset() * 60000;
            const fechaLocal = (new Date(d - offset)).toISOString().split('T')[0];
            document.getElementById('inputFechaEvento').value = fechaLocal;
        }

        async function aplicarEventoMasivo() {
            const evento = document.getElementById('selectEvento').value;
            const fecha = document.getElementById('inputFechaEvento').value;
            const filtro = document.getElementById('filtroCiudad').value;

            if (!evento || !fecha) {
                mostrarNotificacion("⚠️ Selecciona un Evento y una Fecha.", "var(--warning)");
                return;
            }

            let procesadosCSV = [];
            
            pedidosEventosLista.forEach(p => {
                const ciudadP = String(p.Localidad || "GENERAL").toUpperCase().trim();
                
                // Aplicamos solo a la ciudad filtrada (o a todos si está en GENERAL)
                if (filtro === "GENERAL" || ciudadP === filtro) {
                    p.Nuevo_Evento_Aplicado = evento;
                    p.Fecha_Evento_Aplicado = fecha;
                    procesadosCSV.push(p);

                    // Envío en segundo plano a Google Sheets
                    if (typeof enviarAGoogleSheets === "function") {
                        let pNube = {...p, Estado: evento};
                        enviarAGoogleSheets(pNube);
                    }
                }
            });

            if (procesadosCSV.length > 0) {
                renderizarTabla();
                descargarCSV(procesadosCSV, evento, fecha);
                mostrarNotificacion(`✅ CSV Generado con ${procesadosCSV.length} pedidos actualizados.`, "var(--success)");
            } else {
                mostrarNotificacion(`❌ No se encontraron pedidos para la ciudad seleccionada.`, "var(--info)");
            }
        }

        // ENVÍO DE DATOS A GOOGLE SHEETS
        async function enviarAGoogleSheets(p) {
            try {
                const opcionesFecha = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const fechaLarga = new Date().toLocaleDateString('es-ES', opcionesFecha).toUpperCase();

                const payload = {
                    fecha: fechaLarga,
                    usuario: operadorActual,
                    idpedido: p.idpedido,
                    referencia: p.Nro_Referencia,
                    estado: p.Estado,
                    ciudad: p.Localidad
                };

                fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error("Error envío Sheets:", e); }
        }

        function descargarCSV(datos, evento, fechaYYYYMMDD) {
            let [y, m, d] = fechaYYYYMMDD.split('-');
            let fechaDDMMYYYY = `${d}/${m}/${y}`;

            let csvContent = "\uFEFFEMPRESA;NRO_REFERENCIA;CODIGO_EVENTO;FECHA_HORA_EVENTO;CONFORMANTE;MOTIVO;OBSERVACION\n";
            
            datos.forEach(p => {
                let empresa = (p.Cliente || "MDELIVERY").toString().replace(/;/g, "");
                let nroRef = (p.Nro_Referencia || p.idpedido || "").toString().replace(/;/g, "");
                csvContent += `${empresa};${nroRef};${evento};${fechaDDMMYYYY};;;\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Carga_Eventos_${evento}_${fechaYYYYMMDD}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function getColorCiudad(ciudad) {
            const c = String(ciudad).toUpperCase().trim();
            if (c.includes('QUITO')) return '#3b82f6'; 
            if (c.includes('GUAYAQUIL')) return '#0ea5e9'; 
            if (c.includes('CUENCA')) return '#8b5cf6'; 
            if (c.includes('AMBATO')) return '#f59e0b'; 
            if (c.includes('SANTO DOMINGO')) return '#10b981'; 
            if (c.includes('SANTA ANA')) return '#ec4899'; 
            return '#64748b'; 
        }

        function renderizarTabla() {
            const tbody = document.getElementById('listaPedidos');
            const filtro = document.getElementById('filtroCiudad').value;
            tbody.innerHTML = '';

            let lista = (filtro === "GENERAL") ? pedidosEventosLista : pedidosEventosLista.filter(p => String(p.Localidad || "").toUpperCase().trim() === filtro);

            lista.forEach((p, i) => {
                const tr = document.createElement('tr');
                
                let celdaEvento = `<span class="badge badge-pendiente">Pendiente</span>`;
                let celdaFecha = `-`;
                
                if (p.Nuevo_Evento_Aplicado !== "") {
                    celdaEvento = `<span class="badge badge-evento">${p.Nuevo_Evento_Aplicado}</span>`;
                    celdaFecha = `<strong>${p.Fecha_Evento_Aplicado}</strong>`;
                    tr.classList.add('fila-procesada'); 
                }

                const badgeEstado = p.Estado?.includes('ENTRE') ? 'var(--success)' : (p.Estado?.includes('NOVE') ? 'var(--danger)' : 'var(--warning)');
                const badgeCiudad = getColorCiudad(p.Localidad);
                const direccionTexto = p.Direccion || '---';

                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td><b>${p.idpedido}</b></td>
                    <td><span class="badge" style="background:${badgeEstado}; color:white">${p.Estado || '-'}</span></td>
                    <td>${celdaEvento}</td>
                    <td>${celdaFecha}</td>
                    <td>${p.Cliente || '---'}</td>
                    <td><span class="text-truncate" title="${direccionTexto}">${direccionTexto}</span></td>
                    <td><span class="badge" style="background:${badgeCiudad}; color:white">${p.Localidad || 'GENERAL'}</span></td>
                `;
                tbody.appendChild(tr);
            });
            
            document.getElementById('lblTotal').innerText = lista.length;
            document.getElementById('lblProcesados').innerText = lista.filter(p => p.Nuevo_Evento_Aplicado !== "").length;
        }

        function mostrarNotificacion(msg, color) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            if(color) toast.style.background = color;
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 4000); 
        }

        async function cerrarSesion() {
            localStorage.removeItem('operador_actual');
            await localforage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
