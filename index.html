<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexNet - Iniciar Sesión</title>
    <style>
        :root {
            --slate-50: #f8fafc; --slate-300: #cbd5e1; --slate-500: #64748b; 
            --slate-700: #334155; --slate-900: #0f172a;
            --morado: #6f42c1; --morado-oscuro: #59339d; --morado-claro: #f3e8ff;
            --red-600: #dc2626; --red-50: #fef2f2;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-700) 100%); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--slate-700);
        }

        .login-wrapper { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }

        .login-box { 
            background: white; padding: 40px; border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); text-align: center; 
        }

        .brand-icon { color: var(--morado); margin-bottom: 15px; }

        h2 { color: var(--slate-900); margin: 0 0 5px 0; font-size: 1.8em; font-weight: 800; }
        p.subtitle { color: var(--slate-500); margin: 0 0 30px 0; font-size: 0.95em; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 8px; color: var(--slate-700); }
        
        input { 
            width: 100%; padding: 12px 15px; border: 1px solid var(--slate-300); 
            border-radius: 8px; box-sizing: border-box; font-size: 1em; 
            transition: all 0.3s; background: var(--slate-50);
        }
        input:focus { outline: none; border-color: var(--morado); box-shadow: 0 0 0 3px var(--morado-claro); background: white; }

        button { 
            width: 100%; padding: 14px; background: var(--morado); color: white; 
            border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; 
            cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; 
            align-items: center; gap: 8px; margin-top: 10px;
        }
        button:hover { background: var(--morado-oscuro); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(111, 66, 193, 0.3); }

        #errorMsg { 
            background: var(--red-50); color: var(--red-600); padding: 12px; 
            border-radius: 8px; font-size: 0.9em; display: none; margin-bottom: 20px; 
            font-weight: 600; border: 1px solid #fecaca;
        }

        .footer-text { margin-top: 25px; font-size: 0.75em; color: var(--slate-500); }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        
        <div class="brand-icon">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
        </div>

        <h2>FlexNet Escaneo</h2>
        <p class="subtitle">Acceso al Sistema de Control Logístico</p>
        
        <div id="errorMsg">
            ⚠️ Usuario o contraseña incorrectos.
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="user">Usuario</label>
                <input type="text" id="user" placeholder="Ej: hector o admin" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="pass">Contraseña</label>
                <input type="password" id="pass" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="btnIngresar">
                Ingresar al Sistema
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>
        
        <div class="footer-text">
            © 2026 FlexNet Logistics S.A.S - Todos los derechos reservados.
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 🔐 CREDENCIALES QUEMADAS (HARDCODEADAS)
    // ==========================================
    const usuariosPermitidos = {
        "admin": { password: "admin", nombreOficial: "ADMIN" },
        "rene": { password: "123", nombreOficial: "RENE" },
        "hector": { password: "123", nombreOficial: "HECTOR" }
    };

    // 🔥 LA SOLUCIÓN AL PROBLEMA 🔥
    // Apenas se abre esta pantalla, forzamos a que se borre cualquier sesión guardada.
    // Así el navegador NUNCA saltará esta pantalla automáticamente.
    window.onload = function() {
        localStorage.removeItem('operador_actual');
    };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); 

        const userIngresado = document.getElementById('user').value.trim().toLowerCase();
        const passIngresado = document.getElementById('pass').value.trim();
        const errorDiv = document.getElementById('errorMsg');

        if (usuariosPermitidos.hasOwnProperty(userIngresado)) {
            if (usuariosPermitidos[userIngresado].password === passIngresado) {
                
                // Si la clave es correcta, guardamos la sesión y saltamos al escaneo
                localStorage.setItem('operador_actual', usuariosPermitidos[userIngresado].nombreOficial);
                window.location.href = 'escaneo.html';
                
            } else {
                errorDiv.style.display = 'block'; 
            }
        } else {
            errorDiv.style.display = 'block'; 
        }
    });
</script>

</body>
</html>
