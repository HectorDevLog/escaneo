<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexNet Ops - Asignación de Guías</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488; --primary-dark: #0f766e;
            --bg: #f8fafc; --sidebar: #115e59; 
            --text-main: #1e293b; --text-muted: #64748b;
            --white: #ffffff; --danger: #ef4444; --success: #22c55e;
            --warning: #f59e0b; --info: #0ea5e9;
        }

        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            margin: 0; display: flex; height: 100vh; color: var(--text-main);
        }

        .sidebar {
            width: 260px; background-color: var(--sidebar); color: white;
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0;
        }
        .brand { font-size: 1.5rem; font-weight: 800; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-link {
            padding: 12px 15px; border-radius: 8px; color: #ccfbf1; text-decoration: none;
            font-weight: 600; margin-bottom: 5px; transition: all 0.2s; display: block;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link.active { background: var(--white); color: var(--primary-dark); }
        .btn-logout { margin-top: auto; background: rgba(255,255,255,0.1); color: #f8fafc; text-align: center; cursor: pointer; padding: 10px; border-radius: 8px; border: none; font-weight: 600; }
        .btn-logout:hover { background: rgba(255,255,255,0.2); }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 1.8rem; font-weight: 800; }
        .user-pill { background: white; padding: 8px 18px; border-radius: 50px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-weight: 600; border: 1px solid #e2e8f0; }

        .card { background: var(--white); border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 20px; align-items: start; }
        
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; 
            font-family: inherit; font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1); }
        select.destacado, input.destacado, textarea.destacado { border: 2px solid var(--primary); background-color: #f0fdfa; font-weight: 600;}

        .bulk-container { display: flex; flex-direction: column; gap: 10px; }
        .btn-aplicar-masivo { 
            width: 100%; padding: 14px; font-size: 1rem; background-color: var(--primary); 
            color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; 
        }
        .btn-aplicar-masivo:hover:not(:disabled) { background-color: var(--primary-dark); transform: translateY(-2px); }
        .btn-aplicar-masivo:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .estado-carga { 
            padding: 12px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 0.9rem;
            background: #f1f5f9; color: var(--text-muted); border: 1px dashed #cbd5e1; margin-bottom: 20px;
        }
        .estado-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        .btn-group { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 10px; }
        button.btn-accion { padding: 10px 18px; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-verde { background-color: #16a34a; }
        .btn-verde:hover { background-color: #15803d; }
        .btn-rojo { background-color: #ef4444; }
        .btn-rojo:hover { background-color: #dc2626; }

        .table-container { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 15px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; vertical-align: middle; }
        tr:hover { background: #f8fafc; }
        tr.fila-procesada { background-color: #f0fdfa !important; } 

        .input-guia-tabla { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-weight: bold; color: var(--primary-dark); text-align: center; text-transform: uppercase; background-color: white;}
        .input-guia-tabla:focus { border-color: var(--primary); }

        .guia-original { font-weight: 800; color: #065f46; background: #ccfbf1; padding: 8px 12px; border-radius: 6px; display: block; border: 1px dashed #5eead4; text-align: center; }

        .badge { padding: 5px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; display: inline-block; color: white;}
        .text-truncate { max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; }

        .stats { display: flex; gap: 20px; margin-top: 10px; }
        .stat-val { font-weight: 800; color: var(--primary); }

        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
        .toast { background: var(--sidebar); color: white; padding: 16px 24px; border-radius: 10px; margin-top: 10px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="sidebar">
        <div class="brand">📦 FlexNet Ops</div>
        <nav>
            <a href="escaneo.html" class="nav-link">Módulo Distribución</a>
            <a href="cargar_eventos.html" class="nav-link">Módulo Eventos</a>
            <a href="#" class="nav-link active">Asignar Guías</a>
            <a href="carta_porte.html" class="nav-link">Carta Porte</a>
        </nav>
        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Asignación de Guías (Tracking)</h1>
                <div class="stats">
                    <span>Total Pedidos: <span class="stat-val" id="lblTotal">0</span></span>
                    <span>Guías Listas: <span class="stat-val" id="lblProcesados" style="color: var(--success)">0</span></span>
                </div>
            </div>
            <div class="user-pill">
                <span id="lblOperador">---</span> • <span id="lblFecha" style="color:var(--text-muted); font-size: 0.8rem;">---</span>
            </div>
        </div>

        <div id="panelCarga" class="estado-carga">
            ⏳ Verificando memoria de sesión...
        </div>

        <div class="card">
            <div class="grid-inputs">
                <div>
                    <label>1. Filtro de Ciudad:</label>
                    <select id="filtroCiudad" disabled onchange="renderizarTabla()">
                        <option value="GENERAL">TODAS (General)</option>
                        <option value="QUITO">QUITO</option>
                        <option value="GUAYAQUIL">GUAYAQUIL</option>
                        <option value="CUENCA">CUENCA</option>
                        <option value="AMBATO">AMBATO</option>
                        <option value="SANTO DOMINGO">SANTO DOMINGO</option>
                        <option value="SANTA ANA">SANTA ANA</option>
                    </select>
                </div>

                <div>
                    <label style="color: var(--primary);">2. Prefijo de Guía (Opcional):</label>
                    <input type="text" id="inputPrefijo" class="destacado" placeholder="Ej: FCT" disabled autocomplete="off">
                    <small style="color: var(--text-muted); font-size: 0.75rem; margin-top: 5px; display: block; font-weight: 600;">Se unirá al inicio de los números.</small>
                </div>

                <div class="bulk-container">
                    <label style="color: var(--primary);">3. Pegado Masivo (Números):</label>
                    <textarea id="bulkInput" rows="2" class="destacado" placeholder="Pega una columna de números desde Excel aquí..." disabled></textarea>
                    <button id="btnAplicarMasivo" class="btn-aplicar-masivo" disabled onclick="aplicarGuiasMasivas()">
                        🚀 UNIR Y APLICAR GUÍAS
                    </button>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-accion btn-rojo" onclick="limpiarGuias()">🧹 Borrar Guías Nuevas</button>
            <button class="btn-accion btn-verde" onclick="generarArchivoGuias()">📥 GENERAR ARCHIVO CSV</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>N°</th>
                        <th>ID Pedido</th>
                        <th>Referencia</th>
                        <th>Cliente</th>
                        <th>Ciudad</th>
                        <th style="width: 250px; text-align: center;">GUÍA (REMITO)</th>
                    </tr>
                </thead>
                <tbody id="listaPedidos"></tbody>
            </table>
        </div>
    </div>

    <script>
        let pedidosGuiasLista = []; 
        let operadorActual = "";

        window.onload = async function() {
            operadorActual = localStorage.getItem('operador_actual');
            if (!operadorActual) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('lblOperador').innerText = operadorActual;
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('lblFecha').innerText = new Date().toLocaleDateString('es-ES', opciones).toUpperCase();

            const panelCarga = document.getElementById('panelCarga');

            try {
                // 🌟 LEEMOS DE LA MEMORIA DE LOCALFORAGE
                const cargaDistribucion = await localforage.getItem('pedidosEscaneados_flexnet');
                
                if (cargaDistribucion && cargaDistribucion.length > 0) {
                    
                    // 1. Evaluamos la base de distribución. Ahora leemos directamente Nro_Remito que viaja desde escaneo.html
                    pedidosGuiasLista = cargaDistribucion.map(p => {
                        let remitoOriginal = String(p.Nro_Remito || "").trim();
                        let tieneRemito = remitoOriginal !== "";
                        
                        return {
                            ...p, 
                            Guia_Asignada: tieneRemito ? remitoOriginal : "",
                            Viene_Con_Guia: tieneRemito
                        };
                    });

                    // 2. Si ya habías guardado cambios manuales, los fusionamos
                    const progresoGuias = localStorage.getItem('estado_guias_aplicadas');
                    if (progresoGuias) {
                        let guardados = JSON.parse(progresoGuias);
                        pedidosGuiasLista = pedidosGuiasLista.map(p => {
                            if (!p.Viene_Con_Guia) { 
                                let pGuardado = guardados.find(g => String(g.idpedido) === String(p.idpedido));
                                if (pGuardado && pGuardado.Guia_Asignada) {
                                    p.Guia_Asignada = pGuardado.Guia_Asignada;
                                }
                            }
                            return p;
                        });
                    }

                    panelCarga.classList.add('estado-ok');
                    panelCarga.innerText = `✅ Sincronización exitosa. ${pedidosGuiasLista.length} pedidos listos.`;
                    
                    ['filtroCiudad', 'inputPrefijo', 'bulkInput', 'btnAplicarMasivo'].forEach(id => document.getElementById(id).disabled = false);
                    
                    renderizarTabla();
                } else {
                    panelCarga.innerText = `⚠️ No hay pedidos en memoria. Carga el monitor en el Módulo de Distribución primero.`;
                }
            } catch (error) {
                console.error("Error al cargar datos:", error);
                panelCarga.innerText = `⚠️ Error leyendo la memoria local.`;
            }
        };

        function mostrarNotificacion(msg, color) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            if (color) toast.style.backgroundColor = color;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function actualizarGuiaManual(idpedido, valorInput) {
            const index = pedidosGuiasLista.findIndex(p => String(p.idpedido) === String(idpedido));
            if (index !== -1) {
                pedidosGuiasLista[index].Guia_Asignada = valorInput.toUpperCase().trim();
                localStorage.setItem('estado_guias_aplicadas', JSON.stringify(pedidosGuiasLista));
                actualizarContadores();
            }
        }

        function aplicarGuiasMasivas() {
            const prefijo = document.getElementById('inputPrefijo').value.trim().toUpperCase();
            const textoPegado = document.getElementById('bulkInput').value.trim();
            const filtroActual = document.getElementById('filtroCiudad').value;

            if (!textoPegado) return mostrarNotificacion("⚠️ DEBES PEGAR LOS NÚMEROS DE GUÍA PRIMERO", "#dc3545");

            const arrayNumeros = textoPegado.split(/[\n\t\s,]+/).filter(Boolean);

            let listaVisibleIndices = [];
            pedidosGuiasLista.forEach((p, index) => {
                const ciudadP = (p.Localidad || "GENERAL").toUpperCase().trim();
                if ((filtroActual === "GENERAL" || ciudadP === filtroActual) && !p.Viene_Con_Guia) {
                    listaVisibleIndices.push(index);
                }
            });

            if (listaVisibleIndices.length === 0) return mostrarNotificacion("⚠️ Todos los pedidos en esta ruta ya tienen guía original.", "#dc3545");

            if (arrayNumeros.length > listaVisibleIndices.length) {
                if(!confirm(`⚠️ ATENCIÓN: Pegaste ${arrayNumeros.length} guías, pero solo hay ${listaVisibleIndices.length} pedidos vacíos. Sobrarán guías. ¿Continuar?`)) return;
            }

            let asignadas = 0;
            for (let i = 0; i < listaVisibleIndices.length; i++) {
                if (i < arrayNumeros.length) {
                    let idxReal = listaVisibleIndices[i];
                    pedidosGuiasLista[idxReal].Guia_Asignada = prefijo + arrayNumeros[i].toUpperCase();
                    asignadas++;
                }
            }

            localStorage.setItem('estado_guias_aplicadas', JSON.stringify(pedidosGuiasLista));
            document.getElementById('bulkInput').value = ""; 
            
            mostrarNotificacion(`✅ ¡ÉXITO! Se asignaron ${asignadas} guías nuevas.`, 'var(--success)');
            renderizarTabla();
        }

        function limpiarGuias() {
            if (confirm("¿Borrar las guías nuevas asignadas? (Las guías originales del Excel no se borrarán).")) {
                pedidosGuiasLista = pedidosGuiasLista.map(p => {
                    if (!p.Viene_Con_Guia) {
                        return { ...p, Guia_Asignada: "" }; 
                    }
                    return p;
                });
                localStorage.removeItem('estado_guias_aplicadas');
                renderizarTabla();
            }
        }

        function actualizarContadores() {
            document.getElementById('lblTotal').innerText = pedidosGuiasLista.length;
            document.getElementById('lblProcesados').innerText = pedidosGuiasLista.filter(p => p.Guia_Asignada !== "").length;
        }

        function getColorCiudad(ciudad) {
            const c = String(ciudad).toUpperCase().trim();
            if (c.includes('QUITO')) return '#3b82f6'; 
            if (c.includes('GUAYAQUIL')) return '#0ea5e9'; 
            if (c.includes('CUENCA')) return '#8b5cf6'; 
            if (c.includes('AMBATO')) return '#f59e0b'; 
            if (c.includes('SANTO DOMINGO')) return '#10b981'; 
            if (c.includes('SANTA ANA')) return '#ec4899'; 
            return '#64748b'; 
        }

        function renderizarTabla() {
            const tbody = document.getElementById('listaPedidos');
            const filtro = document.getElementById('filtroCiudad').value;
            tbody.innerHTML = '';

            let lista = (filtro === "GENERAL") ? pedidosGuiasLista : pedidosGuiasLista.filter(p => String(p.Localidad || "").toUpperCase().trim() === filtro);

            lista.forEach((p, i) => {
                const tr = document.createElement('tr');
                
                if (p.Guia_Asignada !== "") tr.classList.add('fila-procesada'); 
                
                let celdaGuiaHTML = "";
                
                // 🌟 LÓGICA DE BLOQUEO: Si viene de fábrica, se muestra verde oscuro y no se puede editar
                if (p.Viene_Con_Guia) {
                    celdaGuiaHTML = `<span class="guia-original">📄 ${p.Guia_Asignada}</span>`;
                } else {
                    celdaGuiaHTML = `<input type="text" class="input-guia-tabla" placeholder="Escribir guía..." value="${p.Guia_Asignada}" oninput="actualizarGuiaManual('${p.idpedido}', this.value)">`;
                }

                const badgeCiudad = getColorCiudad(p.Localidad);
                const clienteTxt = p.Cliente || '---';

                tr.innerHTML = `
                    <td>${i+1}</td>
                    <td><b>${p.idpedido}</b></td>
                    <td>${p.Nro_Referencia || '-'}</td>
                    <td><span class="text-truncate" title="${clienteTxt}">${clienteTxt}</span></td>
                    <td><span class="badge" style="background:${badgeCiudad}">${p.Localidad || 'GENERAL'}</span></td>
                    <td style="text-align: center;">
                        ${celdaGuiaHTML}
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            actualizarContadores();
        }

        function generarArchivoGuias() {
            const pedidosConGuia = pedidosGuiasLista.filter(p => p.Guia_Asignada && p.Guia_Asignada.trim() !== "");
            
            if (pedidosConGuia.length === 0) return mostrarNotificacion("⚠️ No hay ninguna guía asignada para exportar.", "#ef4444");
            
            const cabeceras = "NRO_PEDIDO;EMPRESA;NRO_REFERENCIA;NRO_REMITO;VALOR_TOTAL_FACTURA;MONEDA_FACTURA;CANTIDAD_BULTOS_TOTAL;PESO_KG_TOTAL;VOLUMEN_M3_TOTAL;TEXTO_AUX_1;TEXTO_AUX_2;FECHA_AUX_1;FECHA_AUX_2;NRO_TRACKING_EXPRESO;NRO_TRACKING_REPRESENTANTE;FECHA_INTERFAZ;NOMBRE_REMITENTE;DIRECCION_REMITENTE;PISO_REMITENTE;DEPARTAMENTO_REMITENTE;CODIGO_POSTAL_REMITENTE;NOMBRE_DESTINATARIO;DIRECCION_DESTINATARIO;PISO_DESTINATARIO;DEPARTAMENTO_DESTINATARIO;CODIGO_POSTAL_DESTINATARIO;NRO_FACTURA;DNI_DESTINATARIO;TELEFONO_MOVIL;TELEFONO_PERSONAL;EMAIL;FECHA_COMPRA;OBSERVACIONES_INTERNAS;OBSERVACIONES_CLIENTE;TIPO_SERVICIO_OPERATIVO;TIPO_SERVICIO_ADMINISTRATIVO;HORARIO_FIJO;HORARIO_FIJO_OBS;CANALIZA_PEDIDO";
            
            let csvContent = "\uFEFF" + cabeceras + "\n";

            pedidosConGuia.forEach(p => {
                let empresa = (p.Cliente || "MDELIVERY").toString().replace(/;/g, "");
                let nroRef = (p.Nro_Referencia || p.idpedido || "").toString().replace(/;/g, "");
                let remito = (p.Guia_Asignada).toString().replace(/;/g, "");
                
                let columnasVaciasFinales = ";".repeat(35);
                csvContent += `;${empresa};${nroRef};${remito}${columnasVaciasFinales}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Carga_Guias_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            mostrarNotificacion("✅ Archivo CSV Generado exitosamente.", "var(--success)");
        }

        async function cerrarSesion() {
            localStorage.removeItem('operador_actual');
            await localforage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
